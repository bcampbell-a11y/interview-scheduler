<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Research Interview Scheduler</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.34.0/dist/tabler-icons.min.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #ffffff;
    --bg2: #f5f5f3;
    --bg3: #efefec;
    --text: #1a1a18;
    --text2: #6b6b67;
    --text3: #9d9d98;
    --border: rgba(0,0,0,0.12);
    --border2: rgba(0,0,0,0.22);
    --radius: 8px;
    --radius-lg: 12px;
    --green-bg: #eaf3de;
    --green-text: #3b6d11;
    --green-border: #c0dd97;
    --blue-bg: #e6f1fb;
    --blue-text: #185fa5;
    --blue-border: #b5d4f4;
    --red-text: #a32d2d;
    --red-bg: #fcebeb;
    --red-border: #f7c1c1;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1a;
      --bg2: #252523;
      --bg3: #2e2e2b;
      --text: #f0f0ec;
      --text2: #a0a09a;
      --text3: #6e6e68;
      --border: rgba(255,255,255,0.1);
      --border2: rgba(255,255,255,0.2);
      --green-bg: #173404;
      --green-text: #c0dd97;
      --green-border: #3b6d11;
      --blue-bg: #042c53;
      --blue-text: #b5d4f4;
      --blue-border: #185fa5;
      --red-text: #f7c1c1;
      --red-bg: #501313;
      --red-border: #a32d2d;
    }
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg3);
    color: var(--text);
    min-height: 100vh;
    padding: 2rem 1rem;
  }

  .container {
    max-width: 660px;
    margin: 0 auto;
  }

  header {
    margin-bottom: 1.75rem;
  }

  header h1 {
    font-size: 22px;
    font-weight: 500;
    margin-bottom: 4px;
  }

  header p {
    font-size: 14px;
    color: var(--text2);
  }

  .tab-bar {
    display: flex;
    gap: 4px;
    margin-bottom: 1.5rem;
    border-bottom: 0.5px solid var(--border);
    padding-bottom: 0;
  }

  .tab {
    padding: 8px 16px;
    font-size: 14px;
    cursor: pointer;
    border: none;
    background: none;
    color: var(--text2);
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    font-family: inherit;
    border-radius: var(--radius) var(--radius) 0 0;
  }

  .tab:hover { color: var(--text); }
  .tab.active { color: var(--text); border-bottom-color: var(--text); font-weight: 500; }
  .tab-spacer { flex: 1; }

  .refresh-btn {
    padding: 8px 10px;
    font-size: 14px;
    cursor: pointer;
    border: none;
    background: none;
    color: var(--text2);
    font-family: inherit;
    display: flex;
    align-items: center;
  }
  .refresh-btn:hover { color: var(--text); }

  .notice {
    font-size: 13px;
    color: var(--text2);
    background: var(--bg2);
    padding: 10px 14px;
    border-radius: var(--radius);
    margin-bottom: 1rem;
    border: 0.5px solid var(--border);
  }

  .card {
    background: var(--bg);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1rem 1.25rem;
    margin-bottom: 12px;
  }

  .day-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
    flex-wrap: wrap;
    gap: 8px;
  }

  .day-title { font-size: 15px; font-weight: 500; }

  .badge {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: var(--radius);
    background: var(--bg2);
    color: var(--text2);
  }

  .slot-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
    gap: 8px;
    margin-top: 10px;
  }

  .slot {
    padding: 10px 8px;
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    font-size: 13px;
    text-align: center;
    cursor: default;
  }

  .slot.open {
    background: var(--green-bg);
    border-color: var(--green-border);
    color: var(--green-text);
    cursor: pointer;
  }
  .slot.open:hover { opacity: 0.75; }

  .slot.taken {
    background: var(--bg2);
    color: var(--text3);
    text-decoration: line-through;
  }

  .slot.mine {
    background: var(--blue-bg);
    border-color: var(--blue-border);
    color: var(--blue-text);
  }

  .booked-list { margin-top: 10px; border-top: 0.5px solid var(--border); padding-top: 8px; }

  .booked-item {
    font-size: 13px;
    padding: 5px 0;
    border-bottom: 0.5px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
  }
  .booked-item:last-child { border-bottom: none; }

  .booked-name { font-weight: 500; }
  .booked-meta { color: var(--text3); font-size: 12px; }

  input, select {
    height: 38px;
    padding: 0 10px;
    border: 0.5px solid var(--border2);
    border-radius: var(--radius);
    font-family: inherit;
    font-size: 14px;
    background: var(--bg);
    color: var(--text);
    width: 100%;
  }
  input:focus { outline: none; border-color: var(--text2); }

  .btn {
    height: 38px;
    padding: 0 16px;
    border: 0.5px solid var(--border2);
    border-radius: var(--radius);
    font-family: inherit;
    font-size: 14px;
    cursor: pointer;
    background: var(--bg);
    color: var(--text);
    display: inline-flex;
    align-items: center;
    gap: 6px;
    white-space: nowrap;
  }
  .btn:hover { background: var(--bg2); }
  .btn-primary { background: var(--text); color: var(--bg); border-color: var(--text); }
  .btn-primary:hover { opacity: 0.85; }
  .btn-sm { height: 30px; padding: 0 10px; font-size: 12px; }
  .btn-danger { color: var(--red-text); border-color: var(--red-border); }
  .btn-danger:hover { background: var(--red-bg); }

  .dur-btn {
    padding: 6px 14px;
    border: 0.5px solid var(--border2);
    border-radius: 20px;
    font-size: 13px;
    cursor: pointer;
    background: var(--bg);
    color: var(--text2);
    font-family: inherit;
  }
  .dur-btn.active { background: var(--text); color: var(--bg); border-color: var(--text); }

  .field { margin-bottom: 14px; }
  .field label { font-size: 13px; color: var(--text2); display: block; margin-bottom: 5px; }

  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1rem;
    z-index: 100;
  }

  .modal {
    background: var(--bg);
    border: 0.5px solid var(--border2);
    border-radius: var(--radius-lg);
    padding: 1.5rem;
    max-width: 360px;
    width: 100%;
    box-shadow: 0 8px 32px rgba(0,0,0,0.18);
  }

  .modal h3 { font-size: 16px; font-weight: 500; margin-bottom: 1.25rem; }

  .modal-btns {
    display: flex;
    gap: 8px;
    justify-content: flex-end;
    margin-top: 1.25rem;
  }

  .status-bar {
    font-size: 12px;
    color: var(--text3);
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 14px;
  }

  .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green-text); display: inline-block; flex-shrink: 0; }
  .dot.err { background: var(--red-text); }
  .dot.loading { background: var(--text3); }

  .spinner {
    display: inline-block;
    width: 14px;
    height: 14px;
    border: 2px solid var(--border2);
    border-top-color: var(--text);
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    vertical-align: -3px;
    margin-right: 6px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .empty { color: var(--text3); font-size: 14px; padding: 1rem 0; }

  .row { display: flex; gap: 12px; }
  .row .field { flex: 1; }

  .success-icon {
    font-size: 48px;
    color: var(--green-text);
    display: block;
    text-align: center;
    margin-bottom: 12px;
  }

  .section-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }

  .admin-pin-wrap {
    max-width: 320px;
    margin: 4rem auto;
    text-align: center;
  }
  .admin-pin-wrap h2 { font-size: 18px; font-weight: 500; margin-bottom: 8px; }
  .admin-pin-wrap p { font-size: 14px; color: var(--text2); margin-bottom: 1.5rem; }
  .pin-row { display: flex; gap: 8px; }
  .pin-row input { flex: 1; }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1><i class="ti ti-calendar-time" style="font-size:22px;vertical-align:-3px;margin-right:8px" aria-hidden="true"></i>Research Interview Scheduler</h1>
    <p>Select an available time slot to book your interview session.</p>
  </header>
  <div id="app"></div>
</div>

<!-- Modal container (outside flow) -->
<div id="modal-container"></div>

<script>
const SB_URL = 'https://pmodhdsytmonkhsnoont.supabase.co/rest/v1';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBtb2RoZHN5dG1vbmtoc25vb250Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkxMzY3NDEsImV4cCI6MjA5NDcxMjc0MX0.U1SoCy6aMJ2ABC8HPKzBQjLa0MXY9t4k6AF4vmR5gqk';
const ADMIN_PIN = '1234'; // Change this to your preferred PIN
const DURATION_KEY = 'sched_duration';

const HDR = {
  'apikey': SB_KEY,
  'Authorization': 'Bearer ' + SB_KEY,
  'Content-Type': 'application/json',
  'Prefer': 'return=representation'
};

let state = {
  view: 'participant',
  windows: [],
  bookings: [],
  duration: parseInt(localStorage.getItem(DURATION_KEY) || '30'),
  loading: true,
  error: null,
  saving: false,
  adminUnlocked: false
};

const myEmail = () => sessionStorage.getItem('sched_email') || '';
const myName = () => sessionStorage.getItem('sched_name') || '';

async function sbGet(table, params = '') {
  const r = await fetch(`${SB_URL}/${table}?${params}`, { headers: HDR });
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}

async function sbPost(table, body) {
  const r = await fetch(`${SB_URL}/${table}`, { method: 'POST', headers: HDR, body: JSON.stringify(body) });
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}

async function sbDelete(table, filter) {
  const r = await fetch(`${SB_URL}/${table}?${filter}`, { method: 'DELETE', headers: { ...HDR, 'Prefer': '' } });
  if (!r.ok) throw new Error(await r.text());
}

async function loadData() {
  state.loading = true;
  render();
  try {
    const [wins, books] = await Promise.all([
      sbGet('availability_windows', 'order=date.asc'),
      sbGet('bookings', 'order=booked_at.asc')
    ]);
    state.windows = wins;
    state.bookings = books;
    state.error = null;
  } catch (e) {
    state.error = 'Could not connect to database.';
  }
  state.loading = false;
  render();
}

function timeToMin(t) { const [h, m] = t.split(':').map(Number); return h * 60 + m; }
function minToTime(m) { return String(Math.floor(m / 60)).padStart(2, '0') + ':' + String(m % 60).padStart(2, '0'); }
function fmtTime(t) {
  const [h, m] = t.split(':').map(Number);
  return (h % 12 || 12) + ':' + (m === 0 ? '00' : String(m).padStart(2, '0')) + (h >= 12 ? ' pm' : ' am');
}
function fmtDate(d) {
  const [y, mo, day] = d.split('-');
  return ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][parseInt(mo)-1] + ' ' + parseInt(day) + ', ' + y;
}
function dow(d) {
  const [y, mo, day] = d.split('-').map(Number);
  return ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'][new Date(y, mo - 1, day).getDay()];
}
function getSlots(w) {
  const s = []; let c = timeToMin(w.start_time); const e = timeToMin(w.end_time);
  while (c + state.duration <= e) { s.push(minToTime(c)); c += state.duration; }
  return s;
}
function getBooking(date, slot) { return state.bookings.find(b => b.window_date === date && b.slot_time === slot); }

function render() {
  const app = document.getElementById('app');
  if (state.loading) {
    app.innerHTML = `<div style="text-align:center;padding:3rem;color:var(--text2)"><span class="spinner"></span>Loading…</div>`;
    return;
  }
  const tabs = `<div class="tab-bar">
    <button class="tab ${state.view === 'participant' ? 'active' : ''}" onclick="setView('participant')">
      <i class="ti ti-calendar-event" aria-hidden="true"></i> Sign up
    </button>
    <button class="tab ${state.view === 'admin' ? 'active' : ''}" onclick="setView('admin')">
      <i class="ti ti-settings" aria-hidden="true"></i> Admin
    </button>
    <span class="tab-spacer"></span>
    <button class="refresh-btn" onclick="loadData()" title="Refresh"><i class="ti ti-refresh" aria-hidden="true"></i></button>
  </div>
  <div class="status-bar">
    <span class="dot ${state.error ? 'err' : ''}"></span>
    ${state.error || 'Live database connected'}
  </div>`;

  let content = '';
  if (state.view === 'participant') content = renderParticipant();
  else if (state.view === 'admin' && !state.adminUnlocked) content = renderPinPrompt();
  else content = renderAdmin();

  app.innerHTML = tabs + content;
}

function renderParticipant() {
  const me = myEmail();
  let h = `<div class="notice"><i class="ti ti-info-circle" aria-hidden="true" style="margin-right:6px"></i>Click any green slot to book your interview. All times are CDT.</div>`;
  if (state.windows.length === 0) return h + `<p class="empty">No availability posted yet — check back soon.</p>`;
  state.windows.forEach(w => {
    const slots = getSlots(w);
    const open = slots.filter(s => !getBooking(w.date, s)).length;
    h += `<div class="card">
      <div class="day-header">
        <div>
          <div class="day-title">${dow(w.date)}, ${fmtDate(w.date)}</div>
          <div style="font-size:13px;color:var(--text2);margin-top:2px">${fmtTime(w.start_time)} – ${fmtTime(w.end_time)} CDT</div>
        </div>
        <span class="badge">${open} open</span>
      </div>
      <div class="slot-grid">
        ${slots.map(s => {
          const b = getBooking(w.date, s);
          const isMe = b && b.email === me;
          const cls = isMe ? 'slot mine' : b ? 'slot taken' : 'slot open';
          const click = !b ? `onclick="openBookModal('${w.date}','${s}')"` : '';
          return `<div class="${cls}" ${click}>${isMe ? fmtTime(s) + ' ✓' : fmtTime(s)}</div>`;
        }).join('')}
      </div>
    </div>`;
  });
  return h;
}

function renderPinPrompt() {
  return `<div class="admin-pin-wrap">
    <h2><i class="ti ti-lock" aria-hidden="true" style="font-size:20px;vertical-align:-3px;margin-right:8px"></i>Admin access</h2>
    <p>Enter your PIN to manage availability windows.</p>
    <div class="pin-row">
      <input type="password" id="pin-input" placeholder="PIN" onkeydown="if(event.key==='Enter')checkPin()">
      <button class="btn btn-primary" onclick="checkPin()">Enter</button>
    </div>
    <p id="pin-error" style="color:var(--red-text);font-size:13px;margin-top:8px;display:none">Incorrect PIN.</p>
  </div>`;
}

function renderAdmin() {
  const dur = state.duration;
  let h = `<div class="notice"><i class="ti ti-lock-open" aria-hidden="true" style="margin-right:6px"></i>Admin view — changes save to the live database instantly.</div>
  <div style="margin-bottom:1.5rem">
    <div class="section-header"><span class="day-title">Slot duration</span></div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      ${[15, 20, 30, 45, 60].map(d => `<button class="dur-btn ${dur === d ? 'active' : ''}" onclick="setDur(${d})">${d} min</button>`).join('')}
    </div>
  </div>
  <div>
    <div class="section-header">
      <span class="day-title">Availability windows</span>
      <button class="btn" onclick="openAddWinModal()"><i class="ti ti-plus" aria-hidden="true"></i> Add window</button>
    </div>
    ${state.windows.length === 0 ? `<p class="empty">No windows yet — add your first availability window above.</p>` : ''}
    ${state.windows.map(w => {
      const slots = getSlots(w);
      const taken = slots.filter(s => getBooking(w.date, s));
      return `<div class="card">
        <div class="day-header">
          <div>
            <div class="day-title">${dow(w.date)}, ${fmtDate(w.date)}</div>
            <div style="font-size:13px;color:var(--text2);margin-top:2px">${fmtTime(w.start_time)} – ${fmtTime(w.end_time)} CDT</div>
          </div>
          <div style="display:flex;gap:8px;align-items:center">
            <span class="badge">${taken.length}/${slots.length} booked</span>
            <button class="btn btn-sm" onclick="openEditWinModal('${w.id}','${w.date}','${w.start_time}','${w.end_time}')" aria-label="Edit"><i class="ti ti-edit" aria-hidden="true"></i></button>
            <button class="btn btn-sm btn-danger" onclick="removeWin('${w.id}','${w.date}')" aria-label="Remove"><i class="ti ti-trash" aria-hidden="true"></i></button>
          </div>
        </div>
        ${taken.length > 0 ? `<div class="booked-list">${taken.map(s => {
          const b = getBooking(w.date, s);
          return `<div class="booked-item">
            <span>${fmtTime(s)} — <span class="booked-name">${b.name}</span></span>
            <span class="booked-meta">${b.email}</span>
          </div>`;
        }).join('')}</div>` : ''}
      </div>`;
    }).join('')}
    ${state.adminUnlocked ? `<button class="btn btn-sm" onclick="lockAdmin()" style="margin-top:8px"><i class="ti ti-lock" aria-hidden="true"></i> Lock admin</button>` : ''}
  </div>`;
  return h;
}

function openModal(html) {
  const mc = document.getElementById('modal-container');
  mc.innerHTML = `<div class="modal-overlay" onclick="if(event.target===this)closeModal()">${html}</div>`;
}
function closeModal() { document.getElementById('modal-container').innerHTML = ''; }

function openAddWinModal() {
  openModal(`<div class="modal">
    <h3><i class="ti ti-calendar-plus" aria-hidden="true" style="font-size:18px;vertical-align:-3px;margin-right:8px"></i>Add availability window</h3>
    <div class="field"><label>Date</label><input type="date" id="m_date"></div>
    <div class="row">
      <div class="field"><label>Start time (CDT)</label><input type="time" id="m_start" value="09:00"></div>
      <div class="field"><label>End time (CDT)</label><input type="time" id="m_end" value="17:00"></div>
    </div>
    <div class="modal-btns">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" id="saveWinBtn" onclick="saveWin()">Save window</button>
    </div>
  </div>`);
}

function openBookModal(date, slot) {
  openModal(`<div class="modal">
    <h3><i class="ti ti-user-check" aria-hidden="true" style="font-size:18px;vertical-align:-3px;margin-right:8px"></i>Book ${fmtTime(slot)}</h3>
    <p style="font-size:13px;color:var(--text2);margin-bottom:1.25rem">${dow(date)}, ${fmtDate(date)} · ${state.duration} minutes · CDT</p>
    <div class="field"><label>Your name</label><input type="text" id="b_name" placeholder="Full name" value="${myName()}"></div>
    <div class="field"><label>Email address</label><input type="email" id="b_email" placeholder="you@example.com" value="${myEmail()}"></div>
    <div class="modal-btns">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" id="bookBtn" onclick="confirmBook('${date}','${slot}')">Confirm booking</button>
    </div>
  </div>`);
  setTimeout(() => { const n = document.getElementById('b_name'); if (n && !n.value) n.focus(); }, 50);
}

function setView(v) { state.view = v; render(); }
function setDur(d) { state.duration = d; localStorage.setItem(DURATION_KEY, d); render(); }
function lockAdmin() { state.adminUnlocked = false; state.view = 'participant'; render(); }

function checkPin() {
  const val = document.getElementById('pin-input').value;
  if (val === ADMIN_PIN) { state.adminUnlocked = true; render(); }
  else { document.getElementById('pin-error').style.display = 'block'; }
}

function openEditWinModal(id, date, start, end) {
  openModal(`<div class="modal">
    <h3><i class="ti ti-edit" aria-hidden="true" style="font-size:18px;vertical-align:-3px;margin-right:8px"></i>Edit availability window</h3>
    <div class="field"><label>Date</label><input type="date" id="m_date" value="${date}"></div>
    <div class="row">
      <div class="field"><label>Start time (CDT)</label><input type="time" id="m_start" value="${start}"></div>
      <div class="field"><label>End time (CDT)</label><input type="time" id="m_end" value="${end}"></div>
    </div>
    <p style="font-size:12px;color:var(--text3);margin-top:4px">Note: existing bookings for this window are preserved unless you change the date.</p>
    <div class="modal-btns">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" id="saveWinBtn" onclick="saveEditWin('${id}','${date}')">Save changes</button>
    </div>
  </div>`);
}

async function saveEditWin(id, oldDate) {
  const date = document.getElementById('m_date').value;
  const start = document.getElementById('m_start').value;
  const end = document.getElementById('m_end').value;
  if (!date || !start || !end) { alert('Please fill in all fields.'); return; }
  if (timeToMin(end) <= timeToMin(start)) { alert('End time must be after start time.'); return; }
  if (date !== oldDate && state.windows.find(w => w.date === date && w.id !== id)) {
    alert('A window for that date already exists.'); return;
  }
  const btn = document.getElementById('saveWinBtn');
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>Saving…';
  try {
    const r = await fetch(`${SB_URL}/availability_windows?id=eq.${id}`, {
      method: 'PATCH',
      headers: HDR,
      body: JSON.stringify({ date, start_time: start, end_time: end })
    });
    if (!r.ok) throw new Error(await r.text());
    const [updated] = await r.json();
    const idx = state.windows.findIndex(w => w.id === id);
    if (idx !== -1) state.windows[idx] = updated;
    if (date !== oldDate) {
      state.bookings = state.bookings.filter(b => b.window_date !== oldDate);
    }
    state.windows.sort((a, b) => a.date.localeCompare(b.date));
    closeModal(); render();
  } catch (e) { alert('Error saving: ' + e.message); btn.disabled = false; btn.innerHTML = 'Save changes'; }
}

async function saveWin() {
  const date = document.getElementById('m_date').value;
  const start = document.getElementById('m_start').value;
  const end = document.getElementById('m_end').value;
  if (!date || !start || !end) { alert('Please fill in all fields.'); return; }
  if (timeToMin(end) <= timeToMin(start)) { alert('End time must be after start time.'); return; }
  if (state.windows.find(w => w.date === date)) { alert('A window for that date already exists.'); return; }
  const btn = document.getElementById('saveWinBtn');
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>Saving…';
  try {
    const [created] = await sbPost('availability_windows', { date, start_time: start, end_time: end });
    state.windows.push(created);
    state.windows.sort((a, b) => a.date.localeCompare(b.date));
    closeModal(); render();
  } catch (e) { alert('Error saving: ' + e.message); btn.disabled = false; btn.innerHTML = 'Save window'; }
}

async function removeWin(id, date) {
  if (!confirm('Remove this window? Existing bookings for this date will also be deleted.')) return;
  try {
    await sbDelete('bookings', `window_date=eq.${date}`);
    await sbDelete('availability_windows', `id=eq.${id}`);
    state.windows = state.windows.filter(w => w.id !== id);
    state.bookings = state.bookings.filter(b => b.window_date !== date);
    render();
  } catch (e) { alert('Error: ' + e.message); }
}

async function confirmBook(date, slot) {
  const name = document.getElementById('b_name').value.trim();
  const email = document.getElementById('b_email').value.trim();
  if (!name || !email) { alert('Please enter your name and email.'); return; }
  if (!email.includes('@')) { alert('Please enter a valid email address.'); return; }
  if (getBooking(date, slot)) { alert('That slot was just taken — please choose another.'); closeModal(); render(); return; }
  const btn = document.getElementById('bookBtn');
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>Booking…';
  try {
    const [booking] = await sbPost('bookings', { window_date: date, slot_time: slot, name, email });
    sessionStorage.setItem('sched_email', email);
    sessionStorage.setItem('sched_name', name);
    state.bookings.push(booking);
    openModal(`<div class="modal" style="text-align:center">
      <i class="ti ti-circle-check success-icon" aria-hidden="true"></i>
      <h3>You're booked!</h3>
      <p style="font-size:14px;color:var(--text2);margin-top:8px">${fmtTime(slot)} CDT · ${dow(date)}, ${fmtDate(date)}</p>
      <p style="font-size:13px;color:var(--text3);margin-top:6px">Duration: ${state.duration} minutes. Please add this to your calendar.</p>
      <div style="margin-top:1.5rem"><button class="btn btn-primary" onclick="closeModal()">Done</button></div>
    </div>`);
    render();
  } catch (e) {
    if (e.message.includes('unique')) { alert('That slot was just taken — please choose another.'); closeModal(); render(); }
    else { alert('Error: ' + e.message); btn.disabled = false; btn.innerHTML = 'Confirm booking'; }
  }
}

loadData();
</script>
</body>
</html>
